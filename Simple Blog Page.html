<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog Page</title>

    <style>

        body{
            background:#f2f2f2;
            font-family:Arial;
        }

        .title{
            text-align:center;
            margin-top:20px;
        }

        .blog-container{
            width:80%;
            margin:auto;
        }

        .post{
            background:white;
            padding:20px;
            margin:20px 0;
            border-radius:10px;
            transition:0.3s;
        }

        .post:hover{
            transform:scale(1.02);
        }

    </style>

</head>
<body>

<h1 class="title">My Blog</h1>

<div class="blog-container">

    <div class="post">

        <h2>Learning Web Development</h2>

        <p>By Jannet | May 2026</p>

        <p>Web development is creative and exciting.</p>

    </div>

    <div class="post">

        <h2>Responsive Design</h2>

        <p>By Jannet | May 2026</p>

        <p>Responsive websites improve user experience.</p>

    </div>

</div>

</body>
</html>
