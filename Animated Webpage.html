<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Animated Webpage</title>

    <style>

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#111;
            font-family:Arial;
        }

        .box{
            color:white;
            font-size:30px;
            animation:fadeSlide 3s infinite;
        }

        @keyframes fadeSlide{

            0%{
                opacity:0;
                transform:translateY(-50px);
            }

            50%{
                opacity:1;
                transform:translateY(0px);
            }

            100%{
                opacity:0;
                transform:translateY(50px);
            }

        }

    </style>

</head>
<body>

<div class="box">

    Welcome to My Animated Website

</div>

</body>
</html>
