<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Google Clone</title>

    <style>

        body{
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            font-family:Arial, sans-serif;
            background:white;
        }

        .container{
            text-align:center;
        }

        img{
            width:270px;
        }

        input{
            width:500px;
            padding:15px;
            margin-top:20px;
            border-radius:30px;
            border:1px solid #ccc;
            outline:none;
        }

        .buttons{
            margin-top:20px;
        }

        button{
            padding:10px 20px;
            margin:5px;
            border:none;
            background:#f2f2f2;
            cursor:pointer;
            border-radius:5px;
        }

        button:hover{
            background:#ddd;
        }

    </style>

</head>
<body>

<div class="container">

    <img src="https://www.google.com/images/branding/googlelogo/1x/googlelogo_color_272x92dp.png">

    <br>

    <input type="text" placeholder="Search Google or type a URL">

    <div class="buttons">

        <button>Google Search</button>

        <button>I'm Feeling Lucky</button>

    </div>

</div>

</body>
</html>
